<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0c0a14"/>
  
  <!-- Decorative grid pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a1625" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>
  
  <!-- Flag on canvas representation -->
  <rect x="100" y="120" width="400" height="280" rx="8" fill="#1e1b2e" stroke="#2d2a3e" stroke-width="2"/>
  
  <!-- Poland flag (white and red bicolor) -->
  <rect x="130" y="150" width="340" height="105" fill="#ffffff"/>
  <rect x="130" y="255" width="340" height="105" fill="#dc143c"/>
  
  <!-- Paintbrush cursor -->
  <g transform="translate(420, 320) rotate(-45)">
    <rect x="0" y="0" width="12" height="80" rx="2" fill="#8b7355"/>
    <rect x="-2" y="75" width="16" height="35" rx="3" fill="#a855f7"/>
  </g>
  
  <!-- Text content -->
  <text x="620" y="280" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="bold" fill="#ffffff">Draw That Flag</text>
  <text x="620" y="350" font-family="system-ui, -apple-system, sans-serif" font-size="32" fill="#a1a1aa">Draw flags from memory!</text>
  
  <!-- Color palette dots -->
  <circle cx="650" cy="420" r="20" fill="#ef4444"/>
  <circle cx="710" cy="420" r="20" fill="#f97316"/>
  <circle cx="770" cy="420" r="20" fill="#eab308"/>
  <circle cx="830" cy="420" r="20" fill="#22c55e"/>
  <circle cx="890" cy="420" r="20" fill="#3b82f6"/>
  <circle cx="950" cy="420" r="20" fill="#a855f7"/>
  
  <!-- Decorative flag icon -->
  <g transform="translate(1050, 80)">
    <path d="M0 0 L0 120 L8 120 L8 70 L80 70 L80 0 Z" fill="#a855f7" opacity="0.3"/>
  </g>
</svg>
